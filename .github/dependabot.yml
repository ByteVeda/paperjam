  version: 2
  updates:
    - package-ecosystem: "cargo"
      directory: "/"
      schedule:
        interval: "weekly"
      groups:
        rust-minor-patch:
          update-types:
            - "minor"
            - "patch"

    - package-ecosystem: "pip"
      directory: "/"
      schedule:
        interval: "weekly"
      groups:
        python-minor-patch:
          update-types:
            - "minor"
            - "patch"

    - package-ecosystem: "npm"
      directory: "/docs-site"
      schedule:
        interval: "weekly"
      groups:
        js-minor-patch:
          update-types:
            - "minor"
            - "patch"

    - package-ecosystem: "github-actions"
      directory: "/"
      schedule:
        interval: "weekly"
      groups:
        actions-all:
          patterns:
            - "*"
