name: Docs

on:
  push:
    branches: [main]
    paths:
      - "docs-site/**"
      - "crates/paperjam-wasm/**"
      - ".github/workflows/docs.yml"
  pull_request:
    branches: [main]
    paths:
      - "docs-site/**"
      - "crates/paperjam-wasm/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Rust cache
        uses: Swatinem/rust-cache@v2.9.1

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Install binaryen (wasm-opt)
        # wasm-pack invokes wasm-opt automatically when it is on PATH.
        # Ubuntu's apt package is too old to validate modern rustc output
        # (rustc 1.95+ emits bulk-memory and sign-extension instructions
        # by default, unsupported by apt-binaryen ~v108), so we install a
        # pinned upstream release from the binaryen GitHub releases page.
        env:
          BINARYEN_VERSION: version_119
        run: |
          set -euo pipefail
          tarball="binaryen-${BINARYEN_VERSION}-x86_64-linux.tar.gz"
          url="https://github.com/WebAssembly/binaryen/releases/download/${BINARYEN_VERSION}/${tarball}"
          curl -fsSL "$url" -o "/tmp/${tarball}"
          tar -xzf "/tmp/${tarball}" -C /tmp
          sudo install -m 0755 "/tmp/binaryen-${BINARYEN_VERSION}/bin/wasm-opt" /usr/local/bin/wasm-opt
          wasm-opt --version

      - name: Build WASM
        run: wasm-pack build crates/paperjam-wasm --target web --release --out-dir ../../docs-site/static/wasm

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: docs-site/package-lock.json

      - name: Install dependencies
        run: cd docs-site && npm ci

      - name: Build Docusaurus
        run: cd docs-site && npm run build

      - name: Upload Pages artifact
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs-site/build

  deploy:
    needs: build
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
