name: Bug report
description: Report a bug or unexpected behavior in paperjam
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: The smallest possible snippet or steps that reproduces the issue.
      render: python
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen instead.

  - type: input
    id: version
    attributes:
      label: paperjam version
      description: Output of `pip show paperjam` or the crate version from `Cargo.toml`.
      placeholder: e.g. 0.1.2
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Linux
        - macOS
        - Windows
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python version
      description: Output of `python --version`. Leave blank if not using Python bindings.
      placeholder: e.g. 3.12.1

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Logs, screenshots, related issues, anything else.
